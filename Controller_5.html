<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>TOPST CAR DASHBOARD CONTROLLER</title>
    <style>
      /* 기본 배경 및 폰트 */
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        text-align: center;
        background-color: #0d1117;
        color: #c9d1d9;
        margin: 0;
        padding: 15px;
        user-select: none;
      }
      h2 {
        color: #58a6ff;
        margin-top: 0;
        font-style: italic;
      }

      /* 상단 상태 바 */
      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        max-width: 850px;
        margin: 0 auto 20px auto;
        padding: 10px 20px;
        background: #161b22;
        border-radius: 10px;
        border: 1px solid #30363d;
      }
      .connect-btn {
        width: 220px;
        height: 45px;
        font-size: 16px;
        font-weight: bold;
        background-color: #da3633;
        border: none;
        border-radius: 6px;
        color: white;
        cursor: pointer;
        transition: 0.2s;
        box-shadow: 0 4px 0 #b32d2a;
      }
      .connect-btn:active {
        transform: translateY(4px);
        box-shadow: 0 0 0 #b32d2a;
      }
      #status {
        font-size: 15px;
        color: #e3b341;
        font-weight: bold;
      }

      /* 전체 대시보드 레이아웃 */
      .dashboard {
        max-width: 850px;
        margin: 0 auto;
        background: linear-gradient(180deg, #1f2428 0%, #0d1117 100%);
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        border: 2px solid #21262d;
      }

      /* 1. 상단: 계기판 & 3차선 대형 레이더 */
      .cluster {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
        padding: 25px;
        background: #000;
        border-radius: 15px;
        border-top: 3px solid #58a6ff;
        box-shadow: inset 0 0 25px rgba(88, 166, 255, 0.15);
      }

      .signal-btn {
        font-size: 28px;
        background: #161b22;
        color: #484f58;
        border: 2px solid #30363d;
        border-radius: 50%;
        width: 70px;
        height: 70px;
        cursor: pointer;
        transition: 0.2s;
      }
      .signal-btn:active {
        background: #e3b341;
        color: #000;
        box-shadow: 0 0 20px #e3b341;
        transform: scale(0.95);
      }

      .center-cluster {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 380px;
      }
      .speed-text {
        font-size: 48px;
        font-weight: bold;
        color: #39d353;
        font-family: monospace;
        text-shadow: 0 0 10px rgba(57, 211, 83, 0.5);
      }
      .speed-label {
        font-size: 14px;
        color: #8b949e;
        margin-bottom: 5px;
        font-weight: bold;
        letter-spacing: 1px;
      }

      /* ⛽ 연료 게이지 (길이 확장 & % 텍스트 추가) */
      .fuel-section {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 15px;
        width: 100%;
        justify-content: center;
      }
      .fuel-section .fuel-label {
        font-size: 13px;
        color: #8b949e;
        font-weight: bold;
      }
      #fuelSlider {
        width: 250px;
        height: 8px;
        accent-color: #e3b341;
        cursor: pointer;
      }
      #fuelText {
        color: #e3b341;
        font-size: 16px;
        font-weight: bold;
        font-family: monospace;
        width: 45px;
        text-align: left;
      }

      /* 📡 스마트 레이더 UI */
      .radar-box {
        width: 100%;
        height: 240px;
        background: #0a0e14;
        border: 1px solid #30363d;
        border-radius: 12px;
        position: relative;
        overflow: hidden;
        box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.9);
        margin-bottom: 5px;
      }
      .radar-grid {
        position: absolute;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          transparent 49%,
          rgba(88, 166, 255, 0.05) 50%,
          transparent 51%
        );
        background-size: 100% 25px;
      }

      .lane-line {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 3px;
        background: repeating-linear-gradient(
          to bottom,
          transparent,
          transparent 15px,
          rgba(255, 255, 255, 0.3) 15px,
          rgba(255, 255, 255, 0.3) 30px
        );
      }
      .lane-left {
        left: 33%;
      }
      .lane-right {
        left: 66%;
      }

      .ego-car {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 28px;
        height: 42px;
        background: #39d353;
        border-radius: 6px;
        z-index: 10;
        box-shadow: 0 0 15px rgba(57, 211, 83, 0.6);
      }

      .target-dot {
        position: absolute;
        width: 28px;
        height: 18px;
        border-radius: 5px;
        display: none;
        transition: bottom 0.2s linear;
        transform: translateX(-50%);
      }
      #targetL {
        left: 16.5%;
        background: #e3b341;
        box-shadow: 0 0 10px #e3b341;
      }
      #targetC {
        left: 50%;
        background: #ff5e57;
        box-shadow: 0 0 15px #ff5e57;
        z-index: 5;
      }
      #targetR {
        left: 83.5%;
        background: #e3b341;
        box-shadow: 0 0 10px #e3b341;
      }

      .radar-alert {
        color: #8b949e;
        font-size: 14px;
        margin-top: 5px;
        font-weight: bold;
        height: 20px;
        letter-spacing: 0.5px;
      }

      /* 2. 조향 (Steering) 컨트롤 */
      .steering-section {
        margin-bottom: 25px;
        padding: 0 20px;
      }
      .steering-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }
      .steering-label {
        color: #8b949e;
        font-size: 13px;
        font-weight: bold;
        letter-spacing: 1px;
      }

      /* 💡 추가된 조향 각도 텍스트 스타일 */
      .steering-angle {
        color: #58a6ff;
        font-size: 18px;
        font-weight: bold;
        font-family: monospace;
        text-shadow: 0 0 8px rgba(88, 166, 255, 0.4);
        width: 140px;
        text-align: right;
      }

      .steering-slider {
        width: 100%;
        height: 30px;
        -webkit-appearance: none;
        background: #21262d;
        border-radius: 15px;
        border: 2px solid #30363d;
        outline: none;
      }
      .steering-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: #58a6ff;
        cursor: pointer;
        box-shadow: 0 0 15px rgba(88, 166, 255, 0.4);
        transition: 0.1s;
      }
      .steering-slider::-webkit-slider-thumb:active {
        background: #79c0ff;
        transform: scale(1.1);
        box-shadow: 0 0 25px rgba(88, 166, 255, 0.8);
      }

      /* 3. 하단 컨트롤 영역 (조명 & 가속/브레이크 페달) */
      .floor {
        display: flex;
        justify-content: space-between;
        align-items: stretch;
        height: 280px;
        padding: 0 20px;
      }
      .center-console {
        flex: 1;
        background: #161b22;
        border-radius: 12px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: space-around;
        border: 2px solid #30363d;
        margin-right: 30px;
      }
      .console-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }
      .btn-small {
        background: #21262d;
        color: #c9d1d9;
        border: 1px solid #30363d;
        padding: 15px 5px;
        border-radius: 8px;
        cursor: pointer;
        flex: 1;
        font-size: 13px;
        font-weight: bold;
        transition: 0.1s;
      }
      .btn-small:active {
        background: #8b949e;
        color: #000;
        transform: scale(0.95);
      }

      .pedals {
        display: flex;
        gap: 40px;
        align-items: flex-end;
      }
      .pedal-gas-container {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .pedal-label {
        font-size: 14px;
        color: #8b949e;
        font-weight: bold;
        margin-bottom: 12px;
        letter-spacing: 1px;
      }

      .pedal-gas {
        writing-mode: bt-lr;
        -webkit-appearance: slider-vertical;
        width: 80px;
        height: 240px;
        cursor: pointer;
        background: #21262d;
        border-radius: 12px;
        border: 2px solid #30363d;
        accent-color: #39d353;
        outline: none;
      }

      .pedal-brake {
        width: 120px;
        height: 150px;
        background: #da3633;
        border: 4px solid #b32d2a;
        border-radius: 12px;
        color: white;
        font-size: 22px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 12px 0 #8b2321;
        transition: 0.1s;
        letter-spacing: 1px;
      }
      .pedal-brake:active {
        transform: translateY(12px);
        box-shadow: 0 0 0 #8b2321;
        background: #f85149;
      }
    </style>
  </head>
  <body>
    <h2>🚗 TOPST CAR DASHBOARD CONTROLLER 🚗</h2>

    <div class="top-bar">
      <button class="connect-btn" id="connectBtn">ENGINE START (BT)</button>
      <span id="status">SYS: OFFLINE</span>
    </div>

    <div class="dashboard">
      <div class="cluster">
        <div>
          <button class="signal-btn" onclick="sendCmd('105 0101\n')">◀</button>
          <div
            style="
              font-size: 13px;
              margin-top: 10px;
              color: #8b949e;
              font-weight: bold;
            "
          >
            L-TURN
          </div>
          <button
            class="btn-small"
            style="margin-top: 10px; padding: 8px"
            onclick="sendCmd('105 0102\n')"
          >
            OFF
          </button>
        </div>

        <div class="center-cluster">
          <div class="speed-label">SPEED (km/h)</div>
          <div class="speed-text" id="speedValText">0</div>

          <div class="fuel-section">
            <span class="fuel-label">FUEL</span>
            <input
              type="range"
              id="fuelSlider"
              min="0"
              max="100"
              value="100"
              oninput="
                document.getElementById('fuelText').innerText = this.value + '%'
              "
              onchange="sendSliderData(107, this.value)"
            />
            <span id="fuelText">100%</span>
          </div>

          <div class="radar-box">
            <div class="radar-grid"></div>
            <div class="lane-line lane-left"></div>
            <div class="lane-line lane-right"></div>

            <div class="target-dot" id="targetL"></div>
            <div class="target-dot" id="targetC"></div>
            <div class="target-dot" id="targetR"></div>

            <div class="ego-car"></div>
          </div>
          <div class="radar-alert" id="radarAlert">SYSTEM STANDBY</div>
        </div>

        <div>
          <button class="signal-btn" onclick="sendCmd('105 0201\n')">▶</button>
          <div
            style="
              font-size: 13px;
              margin-top: 10px;
              color: #8b949e;
              font-weight: bold;
            "
          >
            R-TURN
          </div>
          <button
            class="btn-small"
            style="margin-top: 10px; padding: 8px"
            onclick="sendCmd('105 0202\n')"
          >
            OFF
          </button>
        </div>
      </div>

      <div class="steering-section">
        <div class="steering-header">
          <span class="steering-label">STEERING CONTROL</span>
          <span class="steering-angle" id="steerAngleText">0° (CENTER)</span>
        </div>
        <input
          type="range"
          class="steering-slider"
          id="steerSlider"
          min="0"
          max="127"
          value="63"
          oninput="updateSteeringText(this.value)"
          onchange="sendSliderData(103, this.value)"
        />
      </div>

      <div class="floor">
        <div class="center-console">
          <div
            style="
              color: #8b949e;
              font-size: 12px;
              font-weight: bold;
              margin-bottom: 5px;
            "
          >
            LIGHTING SYSTEM
          </div>
          <div class="console-row">
            <button class="btn-small" onclick="sendCmd('106 01\n')">
              HEAD ON
            </button>
            <button class="btn-small" onclick="sendCmd('106 02\n')">
              HEAD OFF
            </button>
          </div>
          <div class="console-row">
            <button
              class="btn-small"
              style="background: #da3633; color: white; border-color: #b32d2a"
              onclick="sendCmd('101 01\n')"
            >
              HAZARD ON (비상등)
            </button>
            <button class="btn-small" onclick="sendCmd('101 02\n')">
              HAZARD OFF
            </button>
          </div>

          <div
            style="
              color: #8b949e;
              font-size: 12px;
              font-weight: bold;
              margin-top: 15px;
              margin-bottom: 5px;
            "
          >
            BRAKE LIGHT TEST
          </div>
          <div class="console-row">
            <button class="btn-small" onclick="sendCmd('102 01\n')">
              BRK ON
            </button>
            <button class="btn-small" onclick="sendCmd('102 02\n')">
              BRK OFF
            </button>
          </div>
        </div>

        <div class="pedals">
          <button class="pedal-brake" onclick="emergencyStop()">BRAKE</button>
          <div class="pedal-gas-container">
            <div class="pedal-label">ACCELERATOR</div>
            <input
              type="range"
              class="pedal-gas"
              id="speedSlider"
              min="0"
              max="100"
              value="0"
              oninput="
                document.getElementById('speedValText').innerText = this.value
              "
              onchange="sendSliderData(104, this.value)"
            />
          </div>
        </div>
      </div>
    </div>

    <script>
      let port;
      let writer;

      // 블루투스 연결
      document
        .getElementById("connectBtn")
        .addEventListener("click", async () => {
          try {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 9600 });
            writer = port.writable.getWriter();

            document.getElementById("status").innerText = "SYS: CONNECTED 🟢";
            document.getElementById("connectBtn").style.backgroundColor =
              "#238636";
            document.getElementById("connectBtn").innerText = "ENGINE RUNNING";
            document.getElementById("radarAlert").innerText = "SCANNING...";

            startReading();
          } catch (err) {
            console.error("Connection failed:", err);
            alert("블루투스 연결에 실패했습니다.");
          }
        });

      // 데이터 수신 루프
      async function startReading() {
        const reader = port.readable.getReader();
        const decoder = new TextDecoder("utf-8");
        let buffer = "";

        try {
          while (true) {
            const { value, done } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            let lines = buffer.split("\n");
            buffer = lines.pop();

            for (let line of lines) {
              line = line.trim();
              if (line.startsWith("RADAR:")) {
                updateRadarUI(line);
              }
            }
          }
        } catch (error) {
          console.error("수신 에러:", error);
        } finally {
          reader.releaseLock();
        }
      }

      // 3차선 레이더 UI 업데이트
      function updateRadarUI(dataStr) {
        let parts = dataStr.split(":");
        if (parts.length >= 5) {
          let distL = parseFloat(parts[1]);
          let distC = parseFloat(parts[2]);
          let distR = parseFloat(parts[3]);
          let isAEB = parts[4] === "1";

          updateLaneDot("targetL", distL);
          updateLaneDot("targetC", distC);
          updateLaneDot("targetR", distR);

          let radarAlert = document.getElementById("radarAlert");
          let brkBtn = document.querySelector(".pedal-brake");

          if (distC < 13.0) {
            radarAlert.innerText = `🚨 충돌 위험! 긴급 제동 (전방: ${distC.toFixed(1)}m)`;
            radarAlert.style.color = "#ff5e57";

            document.getElementById("speedSlider").value = 0;
            document.getElementById("speedValText").innerText = "0";

            brkBtn.style.transform = "translateY(12px)";
            brkBtn.style.boxShadow = "0 0 0 #8b2321";
            brkBtn.style.background = "#f85149";
          } else {
            brkBtn.style.transform = "none";
            brkBtn.style.boxShadow = "0 12px 0 #8b2321";
            brkBtn.style.background = "#da3633";

            if (distC < 100) {
              radarAlert.innerText = `전방 차량 감지 (거리: ${distC.toFixed(1)}m)`;
              radarAlert.style.color = "#39d353";
            } else if (distL < 100 || distR < 100) {
              radarAlert.innerText = `측면 차량 감지 (안전 운전)`;
              radarAlert.style.color = "#e3b341";
            } else {
              radarAlert.innerText = "전방 시야 확보 (CLEAR)";
              radarAlert.style.color = "#8b949e";
            }
          }
        }
      }

      function updateLaneDot(elementId, distance) {
        let dot = document.getElementById(elementId);
        if (distance > 0 && distance < 100) {
          dot.style.display = "block";

          // 💡 [원근감 튜닝 변수]
          // 이 숫자를 1.5, 1.8, 2.0 등으로 키울수록 레이더 상에서 차가 훨씬 멀리(위로) 밀려남.
          let visualScale = 1.6;

          // 거리 * 가중치 + 기본 여백(5)을 더해 위치를 계산
          let pos = Math.max(15, Math.min(distance * visualScale + 5, 90));

          dot.style.bottom = pos + "%";
        } else {
          dot.style.display = "none";
        }
      }

      // 💡 조향 슬라이더 각도 계산 함수 (0~127을 -45도 ~ +45도로 변환)
      function updateSteeringText(val) {
        // 63을 중앙(0도)으로 기준 잡고 비율을 구함
        let angle = Math.round(((val - 63) / 63) * 45);
        let directionStr = angle < 0 ? "LEFT" : angle > 0 ? "RIGHT" : "CENTER";
        // 절대값으로 표시
        document.getElementById("steerAngleText").innerText =
          `${Math.abs(angle)}° (${directionStr})`;
      }

      function sendSliderData(canId, decimalValue) {
        let hexValue = parseInt(decimalValue)
          .toString(16)
          .toUpperCase()
          .padStart(2, "0");
        sendCmd(`${canId} ${hexValue}\n`);
      }

      // 수동 긴급 브레이크
      function emergencyStop() {
        document.getElementById("speedSlider").value = 0;
        document.getElementById("speedValText").innerText = "0";
        sendCmd("104 00\n");
        setTimeout(() => sendCmd("102 01\n"), 100);
      }

      // 블루투스 송신
      async function sendCmd(command) {
        if (!writer) return;
        try {
          const data = new TextEncoder().encode(command);
          await writer.write(data);
        } catch (err) {
          console.error("TX Error:", err);
        }
      }
    </script>
  </body>
</html>
